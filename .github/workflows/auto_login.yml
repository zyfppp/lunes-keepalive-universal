name: Lunes Host Auto Keepalive

on:
  schedule:
    - cron: '6 4 */3 * *'  # Daily at 02:00 UTC
  workflow_dispatch:      # Manual trigger

jobs:
  auto-login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install cloudscraper requests
        
      - name: Run auto login
        env:
          LUNES_EMAIL: ${{ secrets.LUNES_EMAIL }}
          LUNES_PASSWORD: ${{ secrets.LUNES_PASSWORD }}
          LUNES_SERVER_URL: ${{ secrets.LUNES_SERVER_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python auto_login.py
